                    "<strong>සිදුවූ ස්ථානය:</strong> කුසිනාරා නුවර උපවත්තන සල් උද්‍යානය.",
                    "<strong>අවසාන වචනය:</strong> වයධම්මා සංඛාරා, අප්පමාදේන සම්පාදේථ (සියලු සංස්කාර ධර්මයෝ නැසෙන සුළුය, අප්‍රමාදීව කුසල් කරන්න).",
                    "අවසාන ශ්‍රාවකයා ලෙස සුභද්‍ර පරිව්‍රාජකයා සසුනේ පැවිදි කිරීම."
                ]
            }
        };

        // Click Card -> Opens Separate Page Layer Beautifully
        function openDetails(eventId) {
            const data = eventDetails[eventId];
            const contentContainer = document.getElementById('dynamicDetailContent');
            const mainDashboard = document.getElementById('mainDashboard');
            const detailView = document.getElementById('detailView');

            let factsHTML = '';
            data.facts.forEach(fact => {
                factsHTML += `<li class="fact-item"><i class="fa-solid fa-dharmachakra"></i> ${fact}</li>`;
            });

            // Creates independent layout inside the opened page
            contentContainer.innerHTML = `
                <div class="detail-video-wrapper" data-aos="zoom-in">
                    <iframe src="${data.videoUrl}" title="Event Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="detail-content">
                    <h2 data-aos="fade-up">${data.title}</h2>
                    <div class="gatha-box" data-aos="fade-up">
                        ${data.gatha}
                    </div>
                    <p class="detail-body-text" data-aos="fade-up">
                        ${data.mainText}
                    </p>
                    <ul class="fact-list" data-aos="fade-up">
                        ${factsHTML}
                    </ul>
                </div>
            `;

            // Separate full-screen slide animation
            mainDashboard.style.opacity = '0';
            mainDashboard.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                detailView.classList.add('active');
                AOS.refresh();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 150);
        }

        // Close Separate Page -> Back to Main Dashboard safely
        function closeDetails() {
            const mainDashboard = document.getElementById('mainDashboard');
            const detailView = document.getElementById('detailView');
            const contentContainer = document.getElementById('dynamicDetailContent');

            detailView.classList.remove('active');
            
            setTimeout(() => {
                mainDashboard.style.opacity = '1';
                mainDashboard.style.transform = 'scale(1)';
                contentContainer.innerHTML = ''; // Destroys video element to completely mute background audio
                AOS.refresh();
            }, 250);
        }

        // Pahan Generator
        const container = document.getElementById('pahanContainer');
        function createPahan() {
            for (let i = 0; i < 25; i++) {
                const pahan = document.createElement('div');
                pahan.className = 'pahan';
                pahan.style.left = Math.random() * 100 + 'vw';
                pahan.style.animationDuration = (Math.random() * 5 + 6) + 's'; 
                pahan.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(pahan);
            }
        }
        createPahan();
    </script>
</body>
</html>
